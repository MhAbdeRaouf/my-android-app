name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Use the official kivy/buildozer Docker image.
      # It ships with the exact NDK/SDK/Java/autoconf versions
      # that p4a was tested against — no manual dependency hell.
      - name: Build APK inside kivy/buildozer container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/home/user/hostcwd \
            kivy/buildozer:latest \
            /bin/sh -c "
              pip install --user cython==0.29.33 --quiet &&
              cd /home/user/hostcwd &&
              yes | buildozer -v android debug
            "

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
          retention-days: 7