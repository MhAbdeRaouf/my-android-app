name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.11"

      # Fix AC_PROG_LIBTOOL: libtool alone is not enough — libltdl-dev provides
      # the m4 macros that autoconf needs when building libffi inside p4a.
      # Also add autoconf automake explicitly to guarantee versions are present.
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            python3-pip python3-setuptools python3-dev \
            build-essential \
            autoconf automake libtool libltdl-dev \
            pkg-config cmake \
            libffi-dev libssl-dev zlib1g-dev \
            libncurses5-dev libncursesw5-dev

      - name: Install Python packages
        run: |
          pip install --user cython==0.29.33
          pip install --user "buildozer>=1.5.0"
          pip install --user virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache .buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Build APK with Buildozer
        run: yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
          retention-days: 7